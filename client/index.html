  <script>function __onVueReady(){window.__vueReady=true;var el=document.getElementById('app-loading');if(el)el.style.display='none';}setTimeout(function(){if(!window.__vueReady){var el=document.getElementById('app-loading');if(el){el.innerHTML='<div><div style="font-size:24px;margin-bottom:12px">ClassNet</div><div style="font-size:14px;opacity:.6;margin-bottom:16px">加载时间较长，请尝试刷新</div><button onclick="location.reload(true)" style="padding:8px 24px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;border-radius:8px;cursor:pointer;font-size:14px">刷新页面</button></div>';}}},15000);</script>
</head>
<body>
  <script>(function(){var t=localStorage.getItem('theme');if(t&&t!=='light'){document.documentElement.setAttribute('data-theme',t);document.body&&(document.body.setAttribute('data-theme',t));}})();</script>
  <div id="app">
    <div id="app-loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,sans-serif;background:#0a0a1a;color:#fff;text-align:center">

    </div>
  </div>
